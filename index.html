<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discreet Online Shop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 520px;
      padding: 30px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #cccccc;
      line-height: 1.5;
    }

    .features {
      margin: 20px 0;
      text-align: left;
      display: inline-block;
    }

    .features li {
      margin: 8px 0;
      color: #dddddd;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 16px 32px;
      background: #ff2d55;
      color: white;
      text-decoration: none;
      font-size: 18px;
      border-radius: 10px;
      font-weight: bold;
    }

    .btn:hover {
      background: #ff1a45;
    }

    .small {
      margin-top: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>Discreet Online Shop</h1>

    <p>
      High-quality adult products with fast and fully discreet delivery.
      Secure shopping experience with complete privacy.
    </p>

    <ul class="features">
      <li>✔ Fast delivery</li>
      <li>✔ 100% discreet packaging</li>
      <li>✔ Secure checkout system</li>
    </ul>

    <a class="btn" href="https://SEXstore.ie" target="_blank">
      Enter Shop
    </a>

    <div class="small">
      18+ only • Adult products store
    </div>

  </div>

</body>
</html>
